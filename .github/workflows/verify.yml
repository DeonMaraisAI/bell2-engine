name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show verification boundary
        run: |
          echo "AUTHORITY=UNVERIFIED"
          echo "PROPAGATION=BLOCKED"
      - name: Run full verification
        run: npm test
